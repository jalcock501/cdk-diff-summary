name: Feature request
description: Suggest an improvement for cdk-diff-summary.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the feature or change you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe any workaround or different design you considered.
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Example output or workflow
      description: Optional. Use sanitized examples only.
      render: markdown
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: Any examples I included are synthetic or sanitized.
          required: true
