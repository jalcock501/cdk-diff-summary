name: Bug report
description: Report incorrect behavior that is not primarily a parser compatibility issue.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please avoid pasting unsanitized CDK diff output. The action intentionally avoids printing before/after values because infrastructure diffs may contain sensitive data.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal workflow snippet, environment variables, or sanitized fixture if useful.
      placeholder: |
        1. Generate a sanitized CDK diff JSON file.
        2. Run cdk-diff-summary with these inputs.
        3. Observe this result.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include action version, CDK version, runner OS, or sanitized output if relevant.
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I did not include secrets, credentials, certificates, personal data, or unsanitized production infrastructure values.
          required: true
