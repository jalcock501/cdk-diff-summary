name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Run ruff
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: CLI smoke test
        run: |
          cdk-diff-summary \
            example_cdk_diff_json/cdk-diff-json-large-realistic.json \
            --title "CDK diff summary - CLI smoke" \
            --output cli-smoke-summary.md
          grep -q "Security group changes" cli-smoke-summary.md

      - name: Prepare action smoke fixture
        run: |
          cat > cdk-diff-smoke.json <<'JSON'
          {
            "stacks": [
              {
                "stackName": "SmokeStack",
                "resources": [
                  {
                    "logicalId": "SmokeFunction",
                    "resourceType": "AWS::Lambda::Function",
                    "action": "modify",
                    "propertyChanges": [
                      { "path": "Runtime" },
                      { "path": "Code.S3Key" }
                    ]
                  }
                ]
              }
            ]
          }
          JSON

      - name: Composite action smoke test
        uses: ./
        with:
          diff-json-path: cdk-diff-smoke.json
          summary-output-path: smoke-summary.md

      - name: Verify composite action smoke summary
        run: grep -q "SmokeFunction" smoke-summary.md

      - name: Larger example composite action smoke test
        uses: ./
        with:
          diff-json-path: example_cdk_diff_json/cdk-diff-json-large-realistic.json
          summary-title: CDK diff summary - larger example
          max-changed-fields: "6"
          summary-output-path: large-example-summary.md

      - name: Verify larger example summary
        run: |
          grep -q "CDK diff summary - larger example" large-example-summary.md
          grep -q "### Modifies" large-example-summary.md
          grep -q "### Security group changes" large-example-summary.md

      - name: Upload larger example summary
        uses: actions/upload-artifact@v4
        with:
          name: large-example-cdk-diff-summary
          path: large-example-summary.md

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
