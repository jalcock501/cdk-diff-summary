name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Run ruff
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: CLI smoke test
        run: |
          cdk-diff-summary \
            example_cdk_changesets_json/large-prod-multistack-cdk-diff.json \
            --title "CDK diff summary - CLI smoke" \
            --output cli-smoke-summary.md
          grep -q "Security group changes" cli-smoke-summary.md

      - name: Prepare action smoke fixture
        run: |
          cp example_cdk_changesets_json/small-webstack-cdk-diff.json change-set-smoke.json

      - name: Composite action smoke test
        uses: ./
        with:
          diff-json-path: change-set-smoke.json
          summary-output-path: smoke-summary.md

      - name: Verify composite action smoke summary
        run: |
          grep -q "WebDistributionCFDistributionA1D23A76" smoke-summary.md
          grep -q "SecurityHeadersPolicy3F6C74E2" smoke-summary.md

      - name: Larger example composite action smoke test
        uses: ./
        with:
          diff-json-path: example_cdk_changesets_json/large-prod-multistack-cdk-diff.json
          summary-title: CDK diff summary - larger example
          max-changed-fields: "6"
          summary-output-path: large-example-summary.md

      - name: Verify larger example summary
        run: |
          grep -q "CDK diff summary - larger example" large-example-summary.md
          grep -q "### Modifies" large-example-summary.md
          grep -q "### Security group changes" large-example-summary.md

      - name: Upload larger example summary
        uses: actions/upload-artifact@v7
        with:
          name: large-example-cdk-diff-summary-${{ matrix.python-version }}
          path: large-example-summary.md

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
