name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Build or release tag to publish, such as v1.1.3-2. Build tags are
          promoted to v1.1.3.
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          build_tag="$INPUT_TAG"
          release_tag="$(printf '%s' "$build_tag" | sed -E 's/-[0-9]+$//')"

          echo "build_tag=$build_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          if [ "$build_tag" = "$release_tag" ]; then
            echo "is_build_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_build_tag=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Release will be created as $release_tag"

      - name: Promote build tag to release tag
        if: steps.tag.outputs.is_build_tag == 'true'
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
          BUILD_TAG: ${{ steps.tag.outputs.build_tag }}
        run: |
          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          target="$(git rev-list -n 1 "$BUILD_TAG")"

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            existing_target="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [ "$existing_target" != "$target" ]; then
              echo "Refusing to move existing release tag $RELEASE_TAG."
              echo "$RELEASE_TAG points at $existing_target, but $BUILD_TAG points at $target."
              exit 1
            fi

            echo "$RELEASE_TAG already points at $target; promotion is already done."
            exit 0
          fi

          git tag -a "$RELEASE_TAG" "$target" -m "Release $RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --target "$RELEASE_TAG"
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --verify-tag

      - name: Delete build release
        if: steps.tag.outputs.is_build_tag == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_TAG: ${{ steps.tag.outputs.build_tag }}
        run: |
          if gh release view "$BUILD_TAG" >/dev/null 2>&1; then
            gh release delete "$BUILD_TAG" --yes
          fi

      - name: Delete build tag
        if: steps.tag.outputs.is_build_tag == 'true'
        env:
          BUILD_TAG: ${{ steps.tag.outputs.build_tag }}
        run: git push origin ":refs/tags/$BUILD_TAG"
